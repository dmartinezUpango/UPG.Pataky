site_name: UPG.Pataky — Guía de Estudio
site_description: Documentación técnica del sistema de integración ERP-PIM-Shopify

theme:
  name: material
  language: es
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    # ── Tabs ─────────────────────────────────────────────────────────────
    - navigation.tabs
    - navigation.tabs.sticky
    # ── Navegación avanzada ──────────────────────────────────────────────
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.prefetch
    - navigation.instant.preview
    - navigation.indexes
    - navigation.path
    - navigation.tracking
    - navigation.prune
    - navigation.top
    - navigation.footer
    # ── Tabla de contenidos ──────────────────────────────────────────────
    - toc.follow
    # ── Búsqueda ─────────────────────────────────────────────────────────
    - search.highlight
    - search.suggest
    - search.share
    # ── Contenido ────────────────────────────────────────────────────────
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.action.edit
    - content.action.view
    - content.tabs.link
    - content.tooltips
    # ── Header ───────────────────────────────────────────────────────────
    - header.autohide

markdown_extensions:
  - tables
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      title: En esta página
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: reactflow
          class: reactflow
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.smartsymbols

plugins:
  - search:
      lang: es
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - tags
  - meta
  - typeset
  # ── Plugins externos (requieren instalación adicional) ────────────────
  # pip install mkdocs-git-revision-date-localized-plugin
  # - git-revision-date-localized:
  #     enable_creation_date: true
  #     type: timeago
  #     fallback_to_build_date: true
  #
  # pip install mkdocs-glightbox
  # - glightbox
  #
  # pip install mkdocs-minify-plugin
  # - minify:
  #     minify_html: true
  #
  # pip install "mkdocs-material[imaging]"
  # - social

extra_css:
  - stylesheets/extra.css
extra_javascript:
  - path: assets/javascripts/reactflow/bundle.reactflow.js
    defer: true

